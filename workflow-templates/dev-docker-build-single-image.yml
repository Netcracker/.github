---

# Workflow to build and publish single docker image
# Dockerfile is expected to be in the root of the repository

name: "CI: Dev Docker Build"
run-name: "Ref: ${{ github.ref_name }}. On ${{ github.event_name }}"

on:
  workflow_dispatch:
    inputs:
      custom-image-name:
        description: 'Image name. If empty, use repository name'
        required: false
        default: ''
      tags:
        description: 'Tags'
        required: false
        type: string
        default: ''
      dry-run:
        description: 'Dry run'
        required: false
        type: boolean
        default: false
  push:
    branches:
    - '**'
    paths-ignore:
    - '.github/**'
    - 'docs/**'
    - 'CODE-OF-CONDUCT.md'
    - 'CONTRIBUTING.md'
    - 'LICENSE'
    - 'README.md'
    - 'SECURITY.md'
  pull_request:
    branches:
    - '**'
    paths-ignore:
    - '.github/**'
    - 'docs/**'
    - 'CODE-OF-CONDUCT.md'
    - 'CONTRIBUTING.md'
    - 'LICENSE'
    - 'README.md'
    - 'SECURITY.md'
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow_ref }}-${{ github.event_name }}-${{ github.ref_type == 'branch' && github.ref_name || github.sha }}
  cancel-in-progress: false

env:
  DRY_RUN: >-
    ${{
      inputs.dry-run ||
      github.event.sender.type == 'Bot' ||
      github.triggering_actor != github.actor ||
      (github.event_name == 'pull_request' &&
        (github.event.pull_request.head.repo.full_name != github.repository ||
          github.event.pull_request.user.type == 'Bot'))
    }}
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  prepare:
    name: "Prepare Docker Image"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      dry-run: ${{ steps.policy.outputs.dry-run }}
      tags: ${{ steps.metadata.outputs.result }}
    steps:
      - name: "Export publish policy"
        id: policy
        env:
          VALUE: ${{ env.DRY_RUN }}
        run: printf 'dry-run=%s\n' "$VALUE" >> "$GITHUB_OUTPUT"

      - name: "Create name"
        uses: netcracker/qubership-workflow-hub/actions/metadata-action@cabbb90e9471163cfac84bd50ff0296b2803b44c # v2.3.0
        id: metadata
        with:
          extra-tags: ${{ inputs.tags || '' }}

      - name: "Summary step"
        env:
          METADATA: ${{ steps.metadata.outputs.result }}
          TAGS: ${{ steps.metadata.outputs.result }}
        run: |
          printf '**Metadata:** %s\n' "$METADATA" >> "$GITHUB_STEP_SUMMARY"
          printf '**Tags:** %s\n' "$TAGS" >> "$GITHUB_STEP_SUMMARY"

  docker-build:
    name: "Docker Image Dry Run"
    if: needs.prepare.outputs.dry-run == 'true'
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: "Build Docker Image"
        uses: netcracker/qubership-workflow-hub/actions/docker-action@cabbb90e9471163cfac84bd50ff0296b2803b44c #v2.3.0
        with:
          custom-image-name: ${{ inputs.custom-image-name || '' }}
          platforms: ${{ env.PLATFORMS }}
          tags: ${{ needs.prepare.outputs.tags }}
          dry-run: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-publish:
    name: "Docker Image Publish"
    if: needs.prepare.outputs.dry-run == 'false' && github.triggering_actor == github.actor
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - name: "Build and Publish Docker Image"
        uses: netcracker/qubership-workflow-hub/actions/docker-action@cabbb90e9471163cfac84bd50ff0296b2803b44c #v2.3.0
        with:
          custom-image-name: ${{ inputs.custom-image-name || '' }}
          platforms: ${{ env.PLATFORMS }}
          tags: ${{ needs.prepare.outputs.tags }}
          dry-run: "false"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
