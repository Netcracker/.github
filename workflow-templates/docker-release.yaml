---

# This workflow is used to release Docker images.
# The workflow is triggered manually and allows the user to specify the release version.
# The workflow also creates a GitHub release after the deployment stage if the deployment is successful.
# The workflow requires the following inputs:
# - `release`: The release version to publish.
# The workflow requires several configuration files:
# - Docker build configuration file: `.qubership/docker-build-config.cfg`
#   Example: config/examples/docker.cfg
#   Full description of configuration file can be found in docs https://github.com/Netcracker/qubership-workflow-hub/tree/main/actions/docker-config-resolver
# - GitHub release drafter configuration file: `.github/release-drafter-config.yml`
#   Example: config/examples/release-drafter-config.yml

name: "Docker Images Release"
on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Release version e.g. 1.0.0 (numbers and dots only). "v" prefix will be added automatically.'
        required: true
        type: string

permissions:
  contents: read
run-name: ${{ github.repository }} Release ${{ github.event.inputs.release }}
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CONFIG_FILE: '.qubership/docker-build-config.cfg'

jobs:
  check-tag:
    name: "Check if tag exists"
    runs-on: ubuntu-latest
    steps:
      - name: "Check if tag exists"
        id: check_tag
        uses: netcracker/qubership-workflow-hub/actions/tag-action@e64a1ee2fc2f68ab44a4ef416c27d83ce36ba8e1  # v2.2.1
        with:
          tag-name: 'v${{ inputs.release }}'
          ref: ${{ github.ref }}
          create-tag: false
          check-tag: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  load-config:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      packages: ${{ steps.config.outputs.config }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Get Configuration File
        uses: netcracker/qubership-workflow-hub/actions/docker-config-resolver@e64a1ee2fc2f68ab44a4ef416c27d83ce36ba8e1 #v2.2.1
        id: config
        with:
          file-path: "${{ env.CONFIG_FILE }}"

  create-tag:
    name: "Create Release Tag"
    needs: [load-config]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: "Create Tag"
        uses: netcracker/qubership-workflow-hub/actions/tag-action@e64a1ee2fc2f68ab44a4ef416c27d83ce36ba8e1  # v2.2.1
        with:
          tag-name: 'v${{ inputs.release }}'
          ref: ${{ github.ref }}
          create-tag: true
          check-tag: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-build:
    name: "${{ matrix.component.name }}"
    needs: [load-config, create-tag]
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        component: ${{ fromJson(needs.load-config.outputs.packages) }}
    steps:
      - name: "Get version for current component"
        id: get-version
        run: |
          echo "IMAGE_VERSION=${{ inputs.release }}" >> $GITHUB_ENV

      - name: "Docker build and publish"
        uses: netcracker/qubership-workflow-hub/actions/docker-action@e64a1ee2fc2f68ab44a4ef416c27d83ce36ba8e1  # v2.2.1
        with:
          ref: 'v${{ inputs.release }}'
          download-artifact: false
          dry-run: false
          component: ${{ toJson(matrix.component) }}
          platforms: ${{ matrix.component.platforms }}
        env:
          GITHUB_TOKEN: ${{ github.token }}

  github-release:
    name: "Github Release"
    needs: [docker-build]
    continue-on-error: false
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout code"
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
          ref: v${{ inputs.release }}
          persist-credentials: false

      - name: "Release-drafter"
        uses: netcracker/release-drafter@86f4276a3894b5af70480e826c32fe3648ac6a70  # v1.0.0
        with:
          config-name: release-drafter-config.yml
          publish: true
          name: ${{ inputs.release }}
          tag: v${{ inputs.release }}
          version: ${{ inputs.release }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
